name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Linter
        # We use 'flake8 .' which is more idiomatic than 'find'
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JSHint
        run: npm install -g jshint

      - name: Debugging - List Files
        run: |
          echo "Current directory:"
          pwd
          echo "Showing directory structure:"
          ls -R

      - name: Run Linter
        run: |
          # Use -maxdepth or check directory existence to prevent crashes
          if [ -d "./server/database" ]; then
            jshint ./server/database
          else
            echo "ERROR: Directory ./server/database not found!"
            exit 1
          fi
