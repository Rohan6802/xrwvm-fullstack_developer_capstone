name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Linter
        # We use 'flake8 .' which is more idiomatic than 'find'
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JSHint
        run: npm install -g jshint

      - name: Run Linter
        run: |
          # 1. Create a valid config file on the fly
          echo '{"esversion": 8, "node": true, "browser": true}' > .jshintrc
          
          # 2. Check if the directory exists and run JSHint
          if [ -d "./server/database" ]; then
            echo "Directory found. Starting lint..."
            # JSHint will automatically look for the .jshintrc we just created
            jshint ./server/database
          else
            echo "Error: Directory ./server/database not found!"
            exit 1
          fi
